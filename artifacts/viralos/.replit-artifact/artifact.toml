kind = "web"
previewPath = "/"
title = "VIRALOS AI"
version = "1.0.0"
id = "artifacts/viralos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19628

[services.development]
run = "pnpm --filter @workspace/viralos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/viralos", "run", "build" ]
publicDir = "artifacts/viralos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19628"
BASE_PATH = "/"
